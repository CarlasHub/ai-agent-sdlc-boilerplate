name: Governance Check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --ignore-scripts
      - run: npm run governance:check
      - run: npm run evals:check
      - run: npm run enterprise:check
      - run: npm run quality:results
      - run: npm run app:verify-zip
      - run: npm run app:verify-behavior
